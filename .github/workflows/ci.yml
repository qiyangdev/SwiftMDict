name: CI

on:
  push:
  pull_request:

jobs:
  test:
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install zlib
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev
      - name: Toolchain
        run: swift --version
      - name: Validate package
        run: swift package describe
      - name: Test
        run: swift test -c release
